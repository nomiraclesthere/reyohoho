<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      ;(() => {
        const configuredBasePath = '__BASE_URL__'
        const normalizedBasePath =
          configuredBasePath && configuredBasePath !== '/'
            ? configuredBasePath.replace(/\/$/, '')
            : ''
        const { pathname, search, hash } = window.location

        let appRoute = pathname
        if (normalizedBasePath && pathname.startsWith(normalizedBasePath)) {
          appRoute = pathname.slice(normalizedBasePath.length)
        }

        if (!appRoute.startsWith('/')) {
          appRoute = `/${appRoute}`
        }

        const redirectTarget = `${appRoute}${search}${hash}`
        const destination = `${normalizedBasePath || ''}/?p=${encodeURIComponent(redirectTarget)}`

        window.location.replace(destination)
      })()
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
