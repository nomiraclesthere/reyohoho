    <script>
      ;(() => {
        const baseUrl = '/reyohoho/'
        const normalizedBase = baseUrl.endsWith('/') ? baseUrl.slice(0, -1) : baseUrl
        const currentUrl = new URL(window.location.href)
        const redirectPath = currentUrl.searchParams.get('p')

        if (!redirectPath) {
          return
        }

        const restoredPath = decodeURIComponent(redirectPath)
        const remainingParams = new URLSearchParams(currentUrl.searchParams)
        remainingParams.delete('p')

        const searchSuffix = remainingParams.toString()
        const nextUrl = `${normalizedBase}${restoredPath}${searchSuffix ? `?${searchSuffix}` : ''}`

        window.history.replaceState(null, '', nextUrl)
      })()
    </script>
